name: Generate Intelligence Brief

on:
  schedule:
    - cron: '0 11 * * *'  # Daily at 6:00 AM EST (11:00 AM UTC)
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install requests python-dateutil
        
    - name: Create script
      run: |
        cat > generate.py << 'ENDOFFILE'
        import requests
        import os
        from datetime import datetime

        def generate_with_grok(prompt):
            api_key = os.environ.get('GROK_API_KEY')
            if not api_key:
                return None, "No Grok API key"
            
            try:
                system_msg = "You are a SIGINT/HUMINT fusion analyst with real-time access to X/Twitter. Monitor both VERIFIED official sources (SIGINT) and UNVERIFIED local accounts (HUMINT/CHATTER). Distinguish between confirmed intelligence and uncorroborated chatter. Use professional intelligence terminology. Access X RIGHT NOW and actively search specified accounts and topics."
                
                data = {
                    'messages': [
                        {'role': 'system', 'content': system_msg},
                        {'role': 'user', 'content': prompt}
                    ],
                    'model': 'grok-4-1-fast-reasoning',
                    'stream': False,
                    'temperature': 0.6,
                    'max_tokens': 4500
                }
                
                response = requests.post(
                    'https://api.x.ai/v1/chat/completions',
                    headers={
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + api_key
                    },
                    json=data,
                    timeout=90
                )
                
                if response.status_code == 200:
                    return response.json()['choices'][0]['message']['content'], None
                else:
                    return None, "Grok error: " + str(response.status_code)
            except Exception as e:
                return None, str(e)

        def generate_with_groq(prompt):
            api_key = os.environ.get('GROQ_API_KEY')
            if not api_key:
                return None, "No Groq API key"
            
            try:
                response = requests.post(
                    'https://api.groq.com/openai/v1/chat/completions',
                    headers={
                        'Authorization': 'Bearer ' + api_key,
                        'Content-Type': 'application/json'
                    },
                    json={
                        'model': 'llama-3.3-70b-versatile',
                        'messages': [{'role': 'user', 'content': prompt}],
                        'temperature': 0.6,
                        'max_tokens': 4000
                    },
                    timeout=60
                )
                
                if response.status_code == 200:
                    return response.json()['choices'][0]['message']['content'], None
                return None, "Groq error"
            except Exception as e:
                return None, str(e)

        timestamp = datetime.now().strftime('%Y-%m-%d %H:%M UTC')
        readable_date = datetime.now().strftime('%B %d, %Y at %H:%M UTC')
        year = str(datetime.now().year)

        prompt_text = "SIGINT/HUMINT COLLECTION TASKING - REAL-TIME X/TWITTER MONITORING\nCollection Period: Past 24 hours ending " + readable_date + "\nCurrent Year: " + year + "\n\nMISSION: Conduct multi-INT collection using both verified official sources (SIGINT) and open chatter from local/unverified accounts (HUMINT). Clearly distinguish intelligence grades.\n\nINTELLIGENCE CLASSIFICATION SYSTEM:\n\n[SIGINT - VERIFIED]: Official government, military, institutional accounts (blue checkmark verified)\n[HUMINT - CHATTER]: Unverified local sources, citizen reports, rumors requiring corroboration\n[OSINT - CONFIRMED]: Cross-verified by multiple independent sources\n\nPRIORITY INTELLIGENCE REQUIREMENTS:\n\n1. GEOPOLITICAL AND MILITARY INTELLIGENCE\n\nSIGINT COLLECTION TARGETS (Verified Official):\n@POTUS @VP @StateDept @SecDef @DeptofDefense @NATO @EUCOM @CENTCOM @INDOPACOM @Europarl_EN @EU_Commission @BorisJohnson @EmmanuelMacron @Bundeskanzler @ZelenskyyUa @Ukrainian_Army @DefenceU @KremlinRussia_E @IDF @Israel_MOD @IsraeliPM @IRGC_Bismillah @Taiwan_SEC @MFA_China @XHNews @StateDeptSpox @PentagonPresSec\n\nHUMINT SOURCES (Journalists/Analysts - Assess credibility):\n@christogrozev @RALee85 @Conflicts @WarMonitors @Osinttechnical @JackDetsch @laraseligman @NatashaBertrand @helenenecostier\n\nCollection Focus:\n- Troop movements and military deployments\n- Diplomatic statements and policy shifts\n- Alliance developments and joint operations\n- Sanctions announcements and economic warfare\n- Arms transfers and defense aid packages\n- Strategic messaging and information operations\n\n2. TECHNOLOGY AND CYBERSECURITY INTELLIGENCE\n\nSIGINT TARGETS (Verified Official/Corporate):\n@elonmusk @sama @satyanadella @sundarpichai @tim_cook @OpenAI @Google @Microsoft @Apple @Meta @Tesla @SpaceX @xAI @USCYBERCOM @CISAgov @NSACyber @FBI\n\nHUMINT SOURCES (Security Researchers - Assess reliability):\n@mattblaze @evacide @thegrugq @SwiftOnSecurity @malwareunicorn @troyhunt @briankrebs @nicoleperlroth\n\nCollection Focus:\n- Product launches and technology breakthroughs\n- Cybersecurity incidents and vulnerability disclosures\n- AI model releases and policy announcements\n- Acquisitions and strategic partnerships\n- Regulatory actions and antitrust developments\n- Critical infrastructure threats\n\n3. UAP/UFO INTELLIGENCE\n\nSIGINT TARGETS (Official Government):\n@DeptofDefense @AARO_DOD_Info @SenGillibrand @RepTimBurchett @SenRubioPress @RepJaredMoskowitz\n\nHUMINT SOURCES (Researchers/Journalists):\n@ChrisKMellon @LueElizondo @rosscoulthart @JeremyCorbell @GadiNBC @TheUfoJoe\n\nCHATTER MONITORING: Search X for recent UAP sighting reports, eyewitness accounts, unverified incidents\n\nCollection Focus:\n- Official Pentagon statements and AARO releases\n- Congressional hearing announcements\n- Credible incident reports with documentation\n- Civilian sighting reports (mark as CHATTER)\n\n4. PARAPSYCHOLOGY AND CONSCIOUSNESS RESEARCH\n\nSIGINT TARGETS (Academic Institutions):\n@Stanford @Harvard @Princeton @MIT @Yale @NaturePortfolio @ScienceMagazine @PLOSONE\n\nCollection Focus:\n- Peer-reviewed publications\n- Research program announcements\n- Conference proceedings\n\nINTELLIGENCE METHODOLOGY:\n\n1. SIGINT COLLECTION (Verified Sources):\n- Monitor official accounts for authoritative statements\n- Flag as [SIGINT - VERIFIED]\n- High confidence intelligence\n\n2. HUMINT COLLECTION (Unverified Sources):\n- Monitor credible journalists and analysts\n- Assess source reliability and track record\n- Flag as [HUMINT - SOURCE ASSESSED]\n\n3. CHATTER MONITORING (Open Social Media):\n- Search X for trending topics, local reports, eyewitness accounts\n- Flag as [HUMINT - CHATTER - UNVERIFIED]\n- Note: Requires corroboration\n\n4. INTELLIGENCE FUSION:\n- Cross-reference SIGINT, HUMINT, and CHATTER\n- Upgrade confidence when multiple sources align\n- Highlight contradictions and information gaps\n\nREPORTING FORMAT:\n\nFor each intelligence item, use classification tags:\n\n[SIGINT - VERIFIED] Official statement from @StateDept at 1400Z confirms...\n[HUMINT - ASSESSED CREDIBLE] @journalist with strong track record reports...\n[HUMINT - CHATTER] Unverified reports on X suggest... (REQUIRES CORROBORATION)\n[OSINT - CONFIRMED] Multiple independent sources confirm...\n\nInclude:\n- Source classification and confidence level\n- Specific X accounts and timestamps\n- Direct quotes when relevant\n- Corroboration status\n- Strategic implications\n\nDISCLAIMER SECTION:\nInclude this at the end:\n\nINTELLIGENCE DISCLAIMER:\n- SIGINT (Verified): High confidence, official sources\n- HUMINT (Assessed): Medium-high confidence, credible analysts\n- CHATTER (Unverified): Low confidence, requires corroboration\n- All CHATTER items should be treated as RUMINT (rumor intelligence) until verified\n\nVALIDATION REQUIREMENTS:\n- Ukraine-
