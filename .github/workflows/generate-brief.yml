name: Generate Intelligence Brief

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: pip install requests python-dateutil
        
    - name: Check before generation
      run: |
        echo "=== BEFORE generation ==="
        ls -la index.html
        head -20 index.html
        
    - name: Create and run script
      env:
        GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        cat > generate.py << 'ENDOFFILE'
        import requests
        import os
        from datetime import datetime

        def generate_with_grok(prompt):
            api_key = os.environ.get('GROK_API_KEY')
            if not api_key:
                return None, "No Grok API key"
            
            try:
                system_msg = "You are a SIGINT/HUMINT fusion analyst with real-time access to X/Twitter. Monitor both VERIFIED official sources (SIGINT) and UNVERIFIED local accounts (HUMINT/CHATTER). Distinguish between confirmed intelligence and uncorroborated chatter. Use professional intelligence terminology. Access X RIGHT NOW and actively search specified accounts and topics."
                
                data = {
                    'messages': [
                        {'role': 'system', 'content': system_msg},
                        {'role': 'user', 'content': prompt}
                    ],
                    'model': 'grok-4-1-fast-reasoning',
                    'stream': False,
                    'temperature': 0.6,
                    'max_tokens': 4500
                }
                
                response = requests.post(
                    'https://api.x.ai/v1/chat/completions',
                    headers={
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + api_key
                    },
                    json=data,
                    timeout=90
                )
                
                if response.status_code == 200:
                    return response.json()['choices'][0]['message']['content'], None
                else:
                    return None, "Grok error: " + str(response.status_code)
            except Exception as e:
                return None, str(e)

        timestamp = datetime.now().strftime('%Y-%m-%d %H:%M UTC')
        readable_date = datetime.now().strftime('%B %d, %Y at %H:%M UTC')
        year = str(datetime.now().year)

        prompt_text = "SIGINT/HUMINT COLLECTION TASKING\nCollection Period: " + readable_date + "\n\nGenerate intelligence brief with SIGINT/HUMINT fusion methodology. Monitor verified and unverified X sources. Tag all intelligence appropriately. Include Ukraine, Middle East conflicts. Cite specific X accounts."

        print("Generating with Grok...")
        content, error = generate_with_grok(prompt_text)

        if content:
            provider = "Grok 4.1 - SIGINT/HUMINT Fusion"
            badge = "GROK-4.1-MULTI-INT"
        else:
            provider = "Generation Failed"
            badge = "ERROR"
            content = "Brief generation failed: " + str(error)

        grok_key_escaped = os.environ.get('GROK_API_KEY', '').replace("'", "\\'")

        html = """<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trident Brief</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            color: #e0e6ed;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
        }
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-bottom: 2px solid #3b82f6;
            padding: 40px;
        }
        .badge {
            background: #dc2626;
            color: white;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 3px;
            display: inline-block;
        }
        h1 {
            font-size: 2.5em;
            color: #3b82f6;
            text-transform: uppercase;
        }
        .meta { color: #94a3b8; margin-top: 10px; }
        .content { padding: 40px; }
        pre { white-space: pre-wrap; line-height: 1.7; }
        .local-intel {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 30px;
            margin: 20px 40px;
        }
        .local-intel h2 { color: #3b82f6; margin-bottom: 15px; }
        .access-form { display: flex; gap: 10px; margin-top: 15px; }
        .access-form input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #e0e6ed;
            padding: 10px 15px;
            border-radius: 4px;
        }
        .access-form button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .access-form button:hover { background: #2563eb; }
        .error-msg { color: #ef4444; margin-top: 10px; }
        .success-msg { color: #10b981; margin-top: 10px; }
        #localBriefContent {
            margin-top: 20px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 4px;
            display: none;
        }
        .footer {
            background: #0f172a;
            border-top: 1px solid rgba(59, 130, 246, 0.3);
            padding: 25px;
            text-align: center;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">CLASSIFIED: SIGINT/HUMINT BRIEF</div>
            <h1>⚔️ THE TRIDENT BRIEF</h1>
            <div class="meta">Generated: """ + timestamp + """ | Source: """ + badge + """</div>
        </div>
        
        <div class="content">
            <pre>""" + content + """</pre>
        </div>
        
        <div class="local-intel">
            <h2>🎯 LOCAL INTELLIGENCE BRIEF</h2>
            <p style="color: #94a3b8; margin-bottom: 15px;">
                Generate localized intelligence for your area (200-mile radius).
            </p>
            <div class="access-form">
                <input type="password" id="accessCode" placeholder="4-digit code" maxlength="4">
                <input type="text" id="zipCode" placeholder="ZIP code" maxlength="5">
                <button onclick="generateLocal()">Generate</button>
            </div>
            <div id="msg"></div>
            <div id="localBriefContent"></div>
        </div>
        
        <div class="footer">
            AUTOMATED MULTI-INT SYSTEM | """ + provider + """ | DAILY 06:00 EST
        </div>
    </div>
    
    <script>
        async function generateLocal() {
            const code = document.getElementById('accessCode').value;
            const zip = document.getElementById('zipCode').value;
            const msg = document.getElementById('msg');
            const content = document.getElementById('localBriefContent');
            
            msg.innerHTML = '';
            content.style.display = 'none';
            
            if (code !== '0330') {
                msg.innerHTML = '<p class="error-msg">Invalid code</p>';
                return;
            }
            
            if (!/^\\d{5}$/.test(zip)) {
                msg.innerHTML = '<p class="error-msg">Invalid ZIP</p>';
                return;
            }
            
            msg.innerHTML = '<p class="success-msg">Generating for ZIP ' + zip + '...</p>';
            
            try {
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer """ + grok_key_escaped + """'
                    },
                    body: JSON.stringify({
                        messages: [{
                            role: 'user',
                            content: 'Generate local intelligence brief for ZIP ' + zip + ' (200-mile radius). Include: crime, law enforcement, politics, business, threats. Search X for local accounts and news. Tag as SIGINT/HUMINT/CHATTER.'
                        }],
                        model: 'grok-4-1-fast-reasoning',
                        temperature: 0.6,
                        max_tokens: 3000
                    })
                });
                
                const data = await response.json();
                content.innerHTML = '<pre>' + data.choices[0].message.content + '</pre>';
                content.style.display = 'block';
                msg.innerHTML = '<p class="success-msg">✅ Brief generated</p>';
                
            } catch (error) {
                msg.innerHTML = '<p class="error-msg">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>"""

        with open('index.html', 'w', encoding='utf-8') as f:
            f.write(html)

        print("File written! Timestamp:", timestamp)
        ENDOFFILE
        
        python3 generate.py
        
    - name: Check after generation
      run: |
        echo "=== AFTER generation ==="
        ls -la index.html
        echo "=== New timestamp ==="
        grep "Generated:" index.html || echo "No timestamp"
        
    - name: Force commit and push
      run: |
        git config user.name "Trident SIGINT"
        git config user.email "sigint@trident.ai"
        git add -A
        git status
        git commit -m "🎯 SIGINT Brief - $(date -u +'%Y-%m-%d %H:%M')" || echo "No changes"
        git push origin main
